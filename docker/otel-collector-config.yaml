# OpenTelemetry Collector configuration
#
# Pipeline: receive OTLP spans from the runtime → batch → export to ClickHouse
#
# The runtime sends spans via OTLPSpanExporter (HTTP/protobuf) to port 4318.
# The collector batches them and writes to ClickHouse's native TCP port 9000.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: otel
    traces_table_name: otel_traces
    logs_table_name: otel_logs
    ttl: 720h                    # 30 days retention
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
