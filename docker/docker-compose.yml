# LLAMPHouse — All-in-one development stack
#
# Usage:
#   docker compose up              # start everything
#   docker compose up -d           # detached
#   docker compose logs -f runtime # follow runtime logs
#
# The runtime runs in all-in-one mode (API + workers in one process).
# For split mode, see docker-compose.prod.yml.

services:
  # ── Agent Runtime (API + workers) ─────────────────────────────────────────
  runtime:
    build:
      context: ..
      dockerfile: docker/runtime/Dockerfile
    command: ["serve", "app:app", "--host", "0.0.0.0", "--port", "80"]
    ports:
      - "8080:80"
    environment:
      - DATABASE_URL=postgresql://llamphouse:llamphouse@postgres:5432/llamphouse
      - REDIS_URL=redis://redis:6379/0
      - LLAMPHOUSE_TRACING_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=llamphouse
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: llamphouse
      POSTGRES_PASSWORD: llamphouse
      POSTGRES_DB: llamphouse
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llamphouse"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── OpenTelemetry Collector ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4318:4318"   # OTLP HTTP
      - "4317:4317"   # OTLP gRPC
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  # ── ClickHouse (traces + analytics) ──────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhousedata:/var/lib/clickhouse
    ports:
      - "8123:8123"   # HTTP interface (for queries)
      - "9000:9000"   # Native TCP (collector writes here)
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  clickhousedata:
